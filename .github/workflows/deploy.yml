name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # 若預設分支是 master，請改成 master

permissions:
  contents: write      # 允許 push 到 gh-pages
  pages: write         # 允許更新 GitHub Pages
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # 之後自行使用 GITHUB_TOKEN

      - name: Set up Git config
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build   # 若輸出目錄不是 ./dist，請自行調整

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist   # 改成你的輸出資料夾，例如 ./build
